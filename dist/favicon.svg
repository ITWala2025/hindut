<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer glow circle -->
  <circle cx="32" cy="32" r="30" fill="url(#gradient1)" opacity="0.3"/>

  <!-- Main background circle -->
  <circle cx="32" cy="32" r="28" fill="url(#gradient2)"/>

  <!-- Inner decorative ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

  <!-- Om symbol -->
  <text x="32" y="42" font-size="32" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">ॐ</text>

  <!-- Sparkle -->
  <circle cx="45" cy="19" r="2" fill="white" opacity="0.8"/>

  <!-- Gradient definitions -->
  <defs>
    <radialGradient id="gradient1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
