[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory       = "netlify/functions"
  node_bundler    = "esbuild"
  # Ensure nodemailer and @supabase/supabase-js are bundled into each function
  included_files  = ["netlify/functions/lib/**"]

[context.production.environment]
  NODE_VERSION = "18"
  # limerickhindutemple.netlify.app is the SANDBOX site — always use test keys.
  # Remove this line only when this site becomes the real production domain.
  STRIPE_MODE = "test"

# SPA fallback so client-side routes (react-router) work on refresh / deep links.
# Netlify evaluates function routes BEFORE redirect rules, so /.netlify/functions/*
# is never intercepted by the wildcard below.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
