[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # The Supabase project URL is *not* a secret — it is required in the client
  # bundle (VITE_SUPABASE_URL is used by src/lib/supabase.ts) and is also
  # hard-coded in image URLs served from Supabase Storage. Tell Netlify's
  # secret scanner to ignore these keys so builds don't fail when the URL
  # appears in compiled output.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,STRIPE_PUBLISHABLE_KEY_TEST"

[functions]
  directory       = "netlify/functions"
  node_bundler    = "esbuild"
  # Ensure nodemailer and @supabase/supabase-js are bundled into each function
  included_files  = ["netlify/functions/lib/**"]

[context.production.environment]
  NODE_VERSION = "18"
  # Production site is now live with real Stripe charges.
  # All live Stripe keys (STRIPE_SECRET_KEY_LIVE, etc.) must be set in Netlify env vars.
  # Force STRIPE_MODE=live for production to ensure functions use live keys
  STRIPE_MODE = "live"

# Deploy preview context (preview builds use test mode)
[context.deploy-preview.environment]
  STRIPE_MODE = "test"

# SPA fallback so client-side routes (react-router) work on refresh / deep links.
# Netlify evaluates function routes BEFORE redirect rules, so /.netlify/functions/*
# is never intercepted by the wildcard below.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security & caching headers ────────────────────────────────────────────────
# Applied to all routes first (broadest rule), then overridden for specifics.

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Enable XSS filter in older browsers
    X-XSS-Protection = "1; mode=block"
    # Limit referrer information leakage
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restrict powerful browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self https://js.stripe.com), usb=()"
    # Enforce HTTPS for 1 year, include subdomains (add preload once tested)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # Content-Security-Policy for public pages
    # - unsafe-inline required: React inline style={} props + TinyMCE
    # - unsafe-eval required: TinyMCE templating engine
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-eval' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https: https://gsqfaguqsmnuoeuhpxro.supabase.co https://*.stripe.com; connect-src 'self' https://gsqfaguqsmnuoeuhpxro.supabase.co wss://gsqfaguqsmnuoeuhpxro.supabase.co https://api.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com https://maps.google.com https://www.google.com; object-src 'none'; base-uri 'self'; form-action 'self' https://checkout.stripe.com;"
    # Cross-origin policies
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "same-site"

# Cache Vite-hashed static assets forever (immutable)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache TinyMCE skins long-term (filename-versioned by tinymce itself)
[[headers]]
  for = "/tinymce/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# Static assets in /public (logo, favicons, sitemap, robots)
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

# SPA entry point — always revalidate
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Sitemap & robots — short cache (updated when content changes)
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"
    Content-Type = "application/xml; charset=UTF-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "text/plain; charset=UTF-8"

# Netlify functions — CORS for API responses
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://www.hindutemple.ie"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
