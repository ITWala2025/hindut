[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # The Supabase project URL is *not* a secret — it is required in the client
  # bundle (VITE_SUPABASE_URL is used by src/lib/supabase.ts) and is also
  # hard-coded in image URLs served from Supabase Storage. Tell Netlify's
  # secret scanner to ignore these keys so builds don't fail when the URL
  # appears in compiled output.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,STRIPE_PUBLISHABLE_KEY_TEST"

[functions]
  directory       = "netlify/functions"
  node_bundler    = "esbuild"
  # Ensure nodemailer and @supabase/supabase-js are bundled into each function
  included_files  = ["netlify/functions/lib/**"]

[context.production.environment]
  NODE_VERSION = "18"
  # limerickhindutemple.netlify.app is the SANDBOX/preview site — always test mode.
  # Production site: https://www.hindutemple.ie
  # On the production site, remove STRIPE_MODE=test and set PRODUCTION_HOSTS=www.hindutemple.ie
  STRIPE_MODE = "test"

# SPA fallback so client-side routes (react-router) work on refresh / deep links.
# Netlify evaluates function routes BEFORE redirect rules, so /.netlify/functions/*
# is never intercepted by the wildcard below.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
