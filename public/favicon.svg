<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <clipPath id="innerCircle">
      <circle cx="32" cy="32" r="26"/>
    </clipPath>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fb923c;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d"/>
      <stop offset="40%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="32" fill="url(#outerGlow)"/>

  <!-- Gold border ring -->
  <circle cx="32" cy="32" r="30" fill="url(#goldRing)"/>

  <!-- White inner circle -->
  <circle cx="32" cy="32" r="26" fill="white"/>

  <!-- HAI logo image clipped to circle -->
  <image href="/HAI%20(Green)%20%20Hindu%20Association%20Ireland%20logo-01.jpg"
         x="6" y="6" width="52" height="52"
         clip-path="url(#innerCircle)"
         preserveAspectRatio="xMidYMid meet"/>
</svg>
